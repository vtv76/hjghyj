<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flappy Bird</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a0a2e;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100dvh; overflow:hidden;
    font-family:'Press Start 2P',monospace;
    touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
  }
  #gameWrapper {
    position:relative;
    display:flex; flex-direction:column;
    align-items:center; gap:8px;
  }
  #topBar {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; padding:0 4px;
    font-size:clamp(7px,2.2vw,11px);
  }
  #scoreTxt { color:#ffe156; text-shadow:2px 2px 0 #b8860b; }
  #bestTxt  { color:#aaffaa; text-shadow:2px 2px 0 #226622; }
  #levelBadge {
    background:linear-gradient(135deg,#ff6b35,#ff0066);
    color:#fff; padding:3px 8px; border-radius:4px;
    font-size:clamp(6px,1.8vw,10px);
    box-shadow:0 2px 0 #880033;
  }
  canvas {
    display:block;
    border:3px solid #ffe156; border-radius:8px;
    box-shadow:0 0 30px #ffe15640, 0 0 60px #ff6b3520;
  }
  #overlay {
    position:absolute; top:0;left:0;right:0;bottom:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px;
    background:rgba(10,4,30,0.85);
    border-radius:6px; padding:20px; text-align:center;
  }
  .emoji-bird {
    font-size:clamp(36px,10vw,54px);
    animation:bob 0.8s ease-in-out infinite alternate;
  }
  @keyframes bob {
    from { transform:translateY(-6px) rotate(-10deg); }
    to   { transform:translateY(6px)  rotate(10deg);  }
  }
  #overlay h1 {
    font-size:clamp(16px,5vw,26px);
    color:#ffe156; text-shadow:3px 3px 0 #b8860b;
    line-height:1.6;
  }
  .score-display {
    color:#fff; font-size:clamp(9px,2.5vw,13px); line-height:2.2;
  }
  .score-display span { color:#ffe156; }
  .score-display .lvl { color:#ff9a00; }
  .btn {
    background:linear-gradient(135deg,#ffe156,#ff9a00);
    color:#1a0a2e; border:none;
    padding:13px 26px;
    font-family:'Press Start 2P',monospace;
    font-size:clamp(9px,2.5vw,12px);
    border-radius:6px; cursor:pointer;
    box-shadow:0 5px 0 #b8860b;
    transition:transform .1s, box-shadow .1s;
  }
  .btn:active { transform:translateY(4px); box-shadow:0 1px 0 #b8860b; }
  #hint { color:#ffffff55; font-size:clamp(6px,1.8vw,9px); line-height:2; }

  /* level up popup */
  #lvlPopup {
    position:absolute; top:18%; left:50%;
    transform:translateX(-50%) scale(0);
    background:linear-gradient(135deg,#ff6b35,#ff0066);
    color:#fff; padding:8px 18px; border-radius:6px;
    font-size:clamp(8px,2.2vw,12px);
    box-shadow:0 4px 0 #880033;
    transition:transform .2s, opacity .3s;
    opacity:0; pointer-events:none; white-space:nowrap;
    z-index:10;
  }
  #lvlPopup.show { transform:translateX(-50%) scale(1); opacity:1; }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="topBar">
    <span id="scoreTxt">ĐIỂM: 0</span>
    <span id="levelBadge">LEVEL 1</span>
    <span id="bestTxt">CAO NHẤT: 0</span>
  </div>
  <canvas id="c"></canvas>
  <div id="lvlPopup">⬆ LEVEL UP!</div>

  <div id="overlay">
    <div class="emoji-bird">🐦</div>
    <h1>FLAPPY<br>BIRD</h1>
    <div id="hint">Chạm màn hình hoặc<br>nhấn SPACE để bay</div>
    <button class="btn" id="startBtn">▶ BẮT ĐẦU</button>
  </div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');

const scoreTxt = document.getElementById('scoreTxt');
const bestTxt  = document.getElementById('bestTxt');
const levelBadge = document.getElementById('levelBadge');
const lvlPopup = document.getElementById('lvlPopup');

function resize() {
  const maxW = Math.min(window.innerWidth - 16, 400);
  const maxH = Math.min(window.innerHeight - 80, 680);
  const ratio = 9 / 16;
  let w = maxW, h = maxW / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width  = Math.floor(w);
  canvas.height = Math.floor(h);
  document.getElementById('gameWrapper').style.width = canvas.width + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if (!running) drawBg(); });

function W() { return canvas.width; }
function H() { return canvas.height; }
function sc(v) { return v * (W() / 320); }
